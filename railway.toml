[build]
builder = "NIXPACKS"
buildCommand = "python -m pip install --upgrade pip && pip install -r psy_bot_backend/requirements.txt"

[deploy]
preDeployCommand = ""
startCommand = "cd psy_bot_backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
