<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F5F1EA" />
  <!-- async: скрипт Telegram НЕ блокирует парсинг/рендер. Если telegram.org
       недоступен (РФ), приложение всё равно отрисуется; интеграция подхватится
       через whenTelegramReady, когда скрипт загрузится. -->
  <script src="https://telegram.org/js/telegram-web-app.js" async></script>
  <title>Александра Архипова · Психолог</title>

  <!-- Шрифты грузятся НЕблокирующе: приложение рисуется сразу на системных
       фолбэках, а Fraunces/Manrope подтягиваются в фоне, если доступны.
       Где Google Fonts недоступен (РФ без VPN) — приложение всё равно работает. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" />
  </noscript>

  <style>
    html, body { margin: 0; background: #F5F1EA; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
